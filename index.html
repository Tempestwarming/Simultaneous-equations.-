<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Simultaneous Equations Tool</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #d4af37 0%, #1b5e20 100%);
            font-family: 'Arial Black', sans-serif; overflow: hidden;
        }

        .timer-bar {
            background: rgba(0, 0, 0, 0.9); color: white; padding: 15px 40px;
            border-radius: 50px; margin-bottom: 20px; display: flex; align-items: center;
            gap: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        #timer-display { font-size: 3rem; font-weight: bold; font-family: monospace; min-width: 150px; text-align: center; color: #f1c40f; }
        .timer-btn { background: #d4af37; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }

        .container {
            width: 96vw; height: 80vh; background-color: #fafaf8;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: grid; grid-template-columns: 1.3fr 0.7fr; overflow: hidden;
        }

        .problem-section { padding: 40px; border-right: 3px solid #eee; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #ffffff; }
        .help-section { padding: 40px; background-color: #f4f4f2; display: flex; flex-direction: column; }

        .equation-box { font-size: 4rem; font-weight: 900; margin: 10px 0; color: #111; min-height: 1.2em; }
        
        .level-select button { padding: 15px 25px; font-size: 1.2rem; margin: 5px; cursor: pointer; border: none; border-radius: 10px; background: #1b5e20; color: white; font-weight: bold; }
        .level-select button:hover { background: #27ae60; }

        input { width: 110px; padding: 10px; font-size: 2rem; border: 5px solid #d4af37; border-radius: 12px; text-align: center; font-weight: bold; }
        
        .action-btn { padding: 20px; font-size: 1.8rem; background: #1b5e20; color: white; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 80%; }

        .instruction-step { background: white; border-left: 10px solid #d4af37; padding: 15px; margin: 10px 0; font-size: 1.3rem; color: #222; }
        #hint-display, #answer-display { margin-top: 15px; display: none; }
        .reveal-btn { background: #444; color: white; border: none; padding: 12px; margin-top: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        
        #feedback { font-size: 2.5rem; margin-top: 20px; font-weight: 900; height: 50px; }
    </style>
</head>
<body>

    <div class="timer-bar">
        <button class="timer-btn" onclick="adjustTimer(-30)">- 30s</button>
        <div id="timer-display">02:00</div>
        <button class="timer-btn" onclick="adjustTimer(30)">+ 30s</button>
        <button class="timer-btn" id="start-pause-btn" onclick="toggleTimer()" style="background: #27ae60;">START</button>
        <button class="timer-btn" onclick="resetTimer()" style="background: #c0392b;">RESET</button>
    </div>

    <div class="container">
        <div class="problem-section">
            <div class="level-select">
                <button onclick="generateProblem(1)">LEVEL 1</button>
                <button onclick="generateProblem(2)">LEVEL 2</button>
                <button onclick="generateProblem(3)">LEVEL 3</button>
            </div>
            <div id="eq1" class="equation-box">Click a Level</div>
            <div id="eq2" class="equation-box">To Start</div>
            <div style="margin-top: 20px; font-size: 2rem;">
                x = <input type="number" id="ansX" step="any">
                y = <input type="number" id="ansY" step="any">
            </div>
            <button class="action-btn" onclick="checkAnswer()">CHECK ANSWER</button>
            <div id="feedback"></div>
        </div>

        <div class="help-section">
            <h2 style="color: #1b5e20; border-bottom: 3px solid #d4af37; font-size: 1.8rem;">Lesson Guide</h2>
            <div class="instruction-step">1. <b>Match:</b> Are the x or y numbers the same?</div>
            <div class="instruction-step">2. <b>Operation:</b> Same Signs Subtract (SS). Different Signs Add.</div>
            <div class="instruction-step">3. <b>Solve:</b> Find one letter, then sub it back.</div>

            <button class="reveal-btn" onclick="toggleHint()">Show Hint</button>
            <div id="hint-display" class="instruction-step" style="border-color: #1b5e20; background: #e8f5e9;"></div>

            <button class="reveal-btn" onclick="toggleAnswer()">Reveal Answer</button>
            <div id="answer-display" class="instruction-step" style="background: #fff3cd;"></div>
        </div>
    </div>

<script>
    let currentX = 0, currentY = 0;
    let timeLeft = 120;
    let timerId = null;

    function updateTimerDisplay() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer-display').innerText = mins.toString().padStart(2, '0') + ":" + secs.toString().padStart(2, '0');
    }

    function toggleTimer() {
        const btn = document.getElementById('start-pause-btn');
        if (timerId) { clearInterval(timerId); timerId = null; btn.innerText = "START"; btn.style.background = "#27ae60"; }
        else { btn.innerText = "PAUSE"; btn.style.background = "#f39c12"; timerId = setInterval(() => { if (timeLeft > 0) { timeLeft--; updateTimerDisplay(); } }, 1000); }
    }

    function adjustTimer(amount) { timeLeft = Math.max(0, timeLeft + amount); updateTimerDisplay(); }
    function resetTimer() { clearInterval(timerId); timerId = null; timeLeft = 120; updateTimerDisplay(); }

    function generateProblem(level) {
        document.getElementById('feedback').innerText = "";
        document.getElementById('hint-display').style.display = "none";
        document.getElementById('answer-display').style.display = "none";
        document.getElementById('ansX').value = "";
        document.getElementById('ansY').value = "";
        
        currentX = Math.floor(Math.random() * 6) + 2;
        currentY = Math.floor(Math.random() * 6) + 2;

        let a, b, d, e, c, f;
        let hintText = "";
        let sign1 = " + ", sign2 = " + ";

        if (level === 1) {
            // Level 1: Same X, Both Positive -> Subtract
            a = Math.floor(Math.random() * 4) + 2;
            d = a; 
            b = Math.floor(Math.random() * 3) + 2;
            e = b + (Math.floor(Math.random() * 3) + 1);
            c = (a * currentX) + (b * currentY);
            f = (d * currentX) + (e * currentY);
            hintText = "Look! Both equations have " + a + "x and they are both positive. SUBTRACT the equations to eliminate x.";
        } else if (level === 2) {
            // Level 2: Same Y, One Positive, One Negative -> Add
            a = Math.floor(Math.random() * 3) + 2;
            d = a + (Math.floor(Math.random() * 3) + 1);
            b = Math.floor(Math.random() * 4) + 2;
            e = b; 
            sign2 = " - "; 
            c = (a * currentX) + (b * currentY);
            f = (d * currentX) - (e * currentY);
            hintText = "One equation has +" + b + "y and the other has -" + b + "y. Since the signs are DIFFERENT, ADD the equations to eliminate y.";
        } else {
            // Level 3: Needs doubling, can be Add or Subtract
            a = Math.floor(Math.random() * 2) + 2;
            b = Math.floor(Math.random() * 3) + 2;
            d = a * 2; 
            e = Math.floor(Math.random() * 4) + 4;
            let useAdd = Math.random() > 0.5;
            if (useAdd) {
                sign2 = " - ";
                c = (a * currentX) + (b * currentY);
                f = (d * currentX) - (e * currentY);
                hintText = "HINT: " + d + "x is double " + a + "x. Multiply Equation 1 by 2, then decide whether to add or subtract!";
            } else {
                c = (a * currentX) + (b * currentY);
                f = (d * currentX) + (e * currentY);
                hintText = "HINT: " + d + "x is double " + a + "x. Multiply Equation 1 by 2, then subtract the equations.";
            }
        }

        document.getElementById('eq1').innerText = a + "x + " + b + "y = " + c;
        document.getElementById('eq2').innerText = d + "x" + sign2 + e + "y = " + f;
        document.getElementById('hint-display').innerText = hintText;
        document.getElementById('answer-display').innerText = "Correct Answer: x = " + currentX + ", y = " + currentY;
    }

    function checkAnswer() {
        const uX = parseFloat(document.getElementById('ansX').value);
        const uY = parseFloat(document.getElementById('ansY').value);
        const fb = document.getElementById('feedback');
        if (uX === currentX && uY === currentY) { fb.innerText = "✅ CORRECT!"; fb.style.color = "green"; }
        else { fb.innerText = "❌ TRY AGAIN"; fb.style.color = "red"; }
    }

    function toggleHint() { let h = document.getElementById('hint-display'); h.style.display = h.style.display === "block" ? "none" : "block"; }
    function toggleAnswer() { let ad = document.getElementById('answer-display'); ad.style.display = ad.style.display === "block" ? "none" : "block"; }

    updateTimerDisplay();
</script>
</body>
</html>
